# Hexapod Configuration
# Single source of truth for all hardware constants, wiring, and tuning parameters.

# ─── Hardware ────────────────────────────────────────────────────────────────
hardware:
  platform: Raspberry Pi 5
  servo_drivers:
    - type: PCA9685
      label: left
      i2c_address: 0x40   # default I2C address (A0-A2 all low)
    - type: PCA9685
      label: right
      i2c_address: 0x41   # A0 pulled high

# ─── Servo Calibration ───────────────────────────────────────────────────────
servo:
  pwm_frequency_hz: 50
  pulse_min_us: 500
  pulse_max_us: 2500
  angle_range_deg: [0, 180]
  # LF knee uses a slightly different servo that needs a wider pulse range
  overrides:
    LF_knee_pulse_max_us: 2700
    LM_knee_pulse_max_us: 2700
    LB_knee_pulse_max_us: 2700

# ─── Wiring ──────────────────────────────────────────────────────────────────
# Each leg has three servos: pan (yaw), hip (pitch), knee (pitch).
# Channel numbers refer to the PCA9685 channel on that leg's board.
# Left legs are mirror-mounted: hardware angle = 180 - logical angle.
#
# Leg naming convention:
#   L = Left,  R = Right
#   F = Front, M = Mid,  B = Back
#
# Board layout (top view, front of robot is +x):
#
#         [LF]   [RF]
#         [LM]   [RM]
#         [LB]   [RB]

#   mount_xyz_mm : pan-axis origin in body frame (mm)
#   mount_yaw_deg: rotation from body +x to leg-local +x about z (deg)
#                  — leg-local +x is the outward direction at neutral pan.
legs:
  LF:
    board: left           # PCA9685 at 0x40
    pan_ch:   2
    hip_ch:   1
    knee_ch:  0
    mirror: true          # hardware angle = 180 - logical angle
    mount_xyz_mm:  [45.0, 68.6, 0.0]
    mount_yaw_deg:  45.0
    pan_neutral_deg: 90.0

  LM:
    board: left
    pan_ch:   6
    hip_ch:   5
    knee_ch:  4
    mirror: true
    mount_xyz_mm:  [0.0, 73.6, 0.0]
    mount_yaw_deg:  90.0
    pan_neutral_deg: 90.0

  LB:
    board: left
    pan_ch:   10
    hip_ch:   9
    knee_ch:  8
    mirror: true
    mount_xyz_mm:  [-45.0, 68.6, 0.0]
    mount_yaw_deg:  135.0
    pan_neutral_deg: 90.0

  RF:
    board: right          # PCA9685 at 0x41
    pan_ch:   6
    hip_ch:   5
    knee_ch:  4
    mirror: false
    mount_xyz_mm:  [45.0, -68.6, 0.0]
    mount_yaw_deg:  -45.0
    pan_neutral_deg: 90.0

  RM:
    board: right
    pan_ch:   10
    hip_ch:   9
    knee_ch:  8
    mirror: false
    mount_xyz_mm:  [0.0, -73.6, 0.0]
    mount_yaw_deg:  -90.0
    pan_neutral_deg: 90.0

  RB:
    board: right
    pan_ch:   14
    hip_ch:   13
    knee_ch:  12
    mirror: false
    mount_xyz_mm:  [-45.0, -68.6, 0.0]
    mount_yaw_deg:  -135.0
    pan_neutral_deg: 90.0

# ─── Kinematics ──────────────────────────────────────────────────────────────
# Per-leg frame (leg-local, origin at pan axis):
#   +x : radially outward at neutral pan
#   +y : tangent (pan rotation direction)
#   +z : up
#
# Kinematic chain:
#   pan (vertical axis) → coxa offset (coxa_lateral outward, coxa_drop down)
#   → hip (horizontal axis) → femur → knee (horizontal axis ‖ hip) → tibia → foot tip
#
# Angle conventions (logical, degrees):
#   pan   = pan_neutral + pan_geom           (pan_geom: azimuth in leg-local xy)
#   hip   = hip_neutral + hip_geom           (hip_geom: femur elevation from horizontal, + toward +z)
#   knee  = interior angle at knee vertex    (180° = straight leg, 90° = L-bent)
kinematics:
  coxa_lateral_mm: 54.0        # pan axis → hip axis, horizontal component
  coxa_drop_mm:    34.0        # hip axis below thorax plane (fixed L-bend, not a DOF)
  femur_mm:        74.0        # hip axis → knee axis
  tibia_mm:        107.0       # knee axis → foot tip
  stand_clearance_mm: 50.0     # thorax center → ground at stand

# ─── Joint Limits (servo space, degrees) ─────────────────────────────────────
limits:
  hip:  [10.0, 170.0]
  knee: [10.0, 170.0]
  # Pan swing is relative to neutral. Front/Back legs get more outward swing.
  pan_inward_deg: 15.0
  pan_outward_front_back_deg: 45.0
  pan_outward_mid_deg: 15.0

# ─── Poses (logical angles, degrees) ─────────────────────────────────────────
# With the 3-link convention:
#   hip_geom = hip - 90   (femur elevation: + = up from horizontal)
#   knee     = interior angle at knee (180 = straight, 90 = L-bent)
poses:
  neutral:
    pan:  90.0     # leg straight outward
    hip:  90.0     # femur horizontal
    knee: 90.0     # tibia perpendicular (foot hangs down 107 mm below knee)
  stand:
    # Target foot in leg-local frame: (110, 0, -80) — legs closer in, 80 mm clearance.
    # Via IK (knee-up branch): knee_inner ≈ 43°, femur elevation ≈ 55°.
    pan:  90.0
    hip:  145.0
    knee: 43.0
    # Front/back legs angled 5° toward forward/backward respectively.
    # Applied as: pan_geom_bias = -sign(mount_yaw)*bias for F, +sign(mount_yaw)*bias for B.
    front_back_pan_bias_deg: 8.0
  sit:
    # Target foot in leg-local frame: (170, 0, 0) — legs extended, body low.
    pan:  90.0
    hip:  167.0
    knee: 82.0

# ─── Motion Control ──────────────────────────────────────────────────────────
control:
  loop_rate_hz: 50          # 0.02s per tick
  max_speed_deg_s: 120.0    # servo rate limit
  angle_epsilon_deg: 0.5    # "close enough" threshold for target reached

# ─── Gait Parameters ─────────────────────────────────────────────────────────
gait:
  tripod:
    # Group A lifts while Group B is in stance, then they swap.
    # Front + back of one side, center of the other side.
    group_a: [RF, RB, LM]
    group_b: [LF, LB, RM]
    lift_height_mm: 30.0
    step_length_mm: 40.0
    swing_ticks: 20       # ticks per lift-move-lower phase at 50 Hz
    duty_cycle: 0.5       # fraction of cycle in stance
